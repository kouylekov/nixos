[mattermost]
host = mattermost.uio.no
team = USIT-UIO
user = milen

tokencmd = /home/milen/.local/bin/pass-cli item view --vault-name Work --item-title Mattermost --field password 

urlOpenCommand = xdg-open

activityNotifyCommand = /home/milen/.config/matterhorn/notify

showTypingIndicator = True

enableMouseMode = True
enableAspell = True
aspellDictionary = "en"

[keybindings]
focus-next-unread = C-a
invoke-editor = C-k
toggle-multiline = F7
