[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[window]
opacity = 0.95
padding = { x = 8, y = 8 }

[colors.primary]
background = "#141414"
foreground = "#e0e0e0"

[colors.normal]
black = "#1a1a1a"
red = "#8a8a8a"
green = "#9a9a9a"
yellow = "#a8a8a8"
blue = "#b0b0b0"
magenta = "#bebebe"
cyan = "#c8c8c8"
white = "#d0d0d0"

[colors.bright]
black = "#404040"
red = "#9a9a9a"
green = "#ababab"
yellow = "#b8b8b8"
blue = "#c0c0c0"
magenta = "#cacaca"
cyan = "#d8d8d8"
white = "#e8e8e8"
