[main]
font=JetBrainsMono Nerd Font:size=12
dpi-aware=auto
prompt="  "
icon-theme=Adwaita
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
terminal=alacritty -e
layer=overlay
lines=12
width=45
horizontal-pad=20
vertical-pad=12
inner-pad=8

[colors]
# Monochromatic theme
background=141414ee
text=e0e0e0ff
match=ffffffff
selection=282828ff
selection-text=e0e0e0ff
selection-match=c0c0c0ff
border=ffffff66

[border]
width=2
radius=12

[dmenu]
mode=text
